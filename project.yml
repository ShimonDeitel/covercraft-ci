name: CoverCraft
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  CoverCraft:
    type: application
    platform: iOS
    sources:
      - path: CoverCraft
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.covercraft
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CoverCraft/Info.plist
        CODE_SIGN_ENTITLEMENTS: CoverCraft/CoverCraft.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CoverCraftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CoverCraftTests
      - path: CoverCraft.storekit
    dependencies:
      - target: CoverCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.covercraft.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CoverCraftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CoverCraftUITests
    dependencies:
      - target: CoverCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.covercraft.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  CoverCraft:
    build:
      targets:
        CoverCraft: all
        CoverCraftTests: [test]
        CoverCraftUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: CoverCraft.storekit
    test:
      config: Debug
      storeKitConfiguration: CoverCraft.storekit
      targets:
        - CoverCraftTests
        - CoverCraftUITests
    archive:
      config: Release
